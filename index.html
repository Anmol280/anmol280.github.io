<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumar Anmol Pratap | Software Engineer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8; 
            --secondary: #22c55e; 
            --dark: #020617;
            --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1);
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--dark); 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }

        /* --- THE CYBER GRID (Slow Pulsing) --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 45px 45px; z-index: -1;
            animation: pulseGrid 8s var(--transition) infinite;
        }

        @keyframes pulseGrid {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Premium Glass Navigation */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
            padding: 1.2rem; display: flex; justify-content: center; gap: 2rem; 
            border-bottom: 1px solid var(--border);
        }
        nav a { 
            color: #94a3b8; text-decoration: none; font-weight: 700; 
            font-size: 0.75rem; text-transform: uppercase; 
            letter-spacing: 1.5px; transition: 0.4s; 
        }
        nav a:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* --- MODERN ASYMMETRICAL HERO --- */
        .hero { 
            height: 100vh; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 10%; 
            position: relative;
        }

        .hero-content-left { flex: 1; max-width: 60%; text-align: left; }
        
        .hero-content-left p { 
            font-size: 1.2rem; color: var(--primary); 
            letter-spacing: 6px; text-transform: uppercase; 
            font-weight: 700; margin-bottom: 1rem;
            animation: glowText 4s linear infinite;
        }

        @keyframes glowText {
            0% { text-shadow: 0 0 10px rgba(56, 189, 248, 0); }
            50% { text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
            100% { text-shadow: 0 0 10px rgba(56, 189, 248, 0); }
        }

        /* --- THE PROFESSIONAL SINGLE-LINE NAME --- */
        .hero-content-left h1 { 
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4.2rem); /* Significantly reduced & responsive */
            font-weight: 800; line-height: 1.2; 
            margin-bottom: 2rem; color: #fff; 
            text-transform: uppercase;
            letter-spacing: -1.5px;
            white-space: nowrap; /* Forces single line */
        }

        /* Professional CTA Buttons */
        .cta-group { display: flex; gap: 1.5rem; }
        .btn { 
            padding: 14px 35px; border-radius: 12px; text-decoration: none; 
            font-weight: 800; text-transform: uppercase; font-size: 0.8rem; 
            letter-spacing: 1px; transition: 0.3s; display: inline-block;
        }
        .btn-primary { 
            background: var(--primary); color: var(--dark); 
            border: 2px solid var(--primary); 
        }
        .btn-primary:hover { 
            background: transparent; color: var(--primary); 
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); 
        }

        .btn-secondary { 
            background: transparent; color: #fff; 
            border: 2px solid #fff; 
        }
        .btn-secondary:hover { 
            border-color: var(--secondary); color: var(--secondary); 
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.3); 
        }

        /* Profile Photo Container (Right Side) */
        .hero-image-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; }
        
        /* CLEAN: No rainbow, just precise halo */
        .profile-wrapper { 
            width: 380px; height: 380px; border-radius: 50%; padding: 6px; 
            background: var(--primary); 
            box-shadow: 0 0 60px rgba(56, 189, 248, 0.3); 
            position: relative;
        }
        .profile-wrapper img { 
            width: 100%; height: 100%; border-radius: 50%; 
            object-fit: cover; object-position: center 15%; 
            border: 6px solid var(--dark); 
        }

        /* Mobile Optimization */
        @media (max-width: 992px) {
            .hero { flex-direction: column-reverse; text-align: center; height: auto; padding: 120px 5% 60px; }
            .hero-content-left { max-width: 100%; margin-top: 3rem; }
            .hero-content-left h1 { font-size: 2.8rem; white-space: normal; } /* Stacks naturally on mobile */
            .hero-image-right { justify-content: center; }
            .profile-wrapper { width: 300px; height: 300px; }
            .cta-group { justify-content: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#about">About</a>
        <a href="#journey">Journey</a>
        <a href="#education">Education</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <header class="hero">
        <div class="hero-content-left" data-aos="fade-right">
            <p>Software Engineer | Cloud Architect</p> <h1>KUMAR ANMOL PRATAP</h1>
            <div class="cta-group">
                <a href="#projects" class="btn btn-primary">View Portfolio</a>
                <a href="#contact" class="btn btn-secondary">Contact Me</a>
            </div>
        </div>

        <div class="hero-image-right" data-aos="fade-left">
            <div class="profile-wrapper">
                <img src="profile.jpg" alt="Kumar Anmol Pratap">
            </div>
        </div>
    </header>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true });
    </script>

</body>
</html>
